<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spansa Pra MPLS</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0">
  
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset CSS dasar */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f3f4f6;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Bingkai Iframe Utama */
    .app-container {
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
    }

    /* --- ESTETIKA LOADING SCREEN --- */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #eff6ff, #dbeafe, #bfdbfe, #e0e7ff);
      background-size: 400% 400%;
      animation: gradientBG 6s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
    }

    /* Animasi Latar Belakang */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Kotak Glassmorphism di tengah */
    .loader-content {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 30px rgba(29, 78, 216, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInUp 1s ease-out forwards;
    }

    /* Animasi masuk konten dari bawah */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo berdenyut elegan */
    .loader-logo {
      max-width: 80px;
      max-height: 80px;
      object-fit: contain;
      margin-bottom: 20px;
      animation: pulseLogo 2s infinite ease-in-out;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
    }

    @keyframes pulseLogo {
      0% { transform: scale(0.95); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.9; }
    }

    /* Tipografi Teks */
    .loading-text {
      color: #1e3a8a;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .loading-sub {
      color: #64748b;
      font-size: 13px;
      font-weight: 300;
      margin-bottom: 25px;
    }

    /* Animasi Bouncing Dots */
    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dots div {
      width: 10px;
      height: 10px;
      background-color: #2563eb;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots div:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots div:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Kelas untuk transisi menghilang */
    .fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Layar Loading -->
  <div id="loader" class="loading-screen">
    <div class="loader-content">
      <img src="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0" alt="Logo SMPN 1 Pasuruan" class="loader-logo">
      <div class="loading-text">UPT SMP NEGERI 1 PASURUAN</div>
      <div class="loading-sub">Menyiapkan Data Pra MPLS...</div>
      
      <div class="loading-dots">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
  </div>

  <!-- Iframe Aplikasi Google Apps Script -->
  <!-- Atribut sandbox dihindari agar otentikasi/redirect skrip Google berjalan normal -->
  <iframe 
    id="gas-app"
    src="https://script.google.com/macros/s/AKfycbyzW4gYX74dTzP3hz0OSbafEkay2zwo_vop8EgYFxYuTt2UgAkoaT7bMRCSN9lnRnhApg/exec" 
    class="app-container"
    allow="geolocation; microphone; camera; midi; encrypted-media;">
  </iframe>

  <script>
    const iframe = document.getElementById('gas-app');
    const loader = document.getElementById('loader');
    let isAppLoaded = false;

    // Fungsi utama untuk menghilangkan loader dengan transisi halus
    function hideLoader() {
      if (!isAppLoaded) {
        isAppLoaded = true;
        loader.classList.add('fade-out');
        
        setTimeout(() => {
          loader.style.display = 'none';
        }, 800);
      }
    }

    // Strategi 1: Deteksi saat iframe selesai dimuat
    iframe.addEventListener('load', hideLoader);

    // Strategi 2: Fallback (Cadangan)
    // Memastikan murid tidak terjebak di layar loading jika koneksi internet lambat 
    // atau terjadi bloking sinyal 'load' dari redirect server Google.
    setTimeout(hideLoader, 7000); // Layar loading paksa hilang setelah 7 detik
  </script>
</body>
</html>
