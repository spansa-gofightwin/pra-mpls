<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MPLS  UPT SMPN 1 Pasuruan</title>
  
  <!-- Favicon Sekolah -->
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0">
  
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Reset CSS dasar */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f1f5f9; /* Warna dasar slate muda */
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Bingkai Iframe Utama */
    .app-container {
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
      /* Sedikit transisi saat loading selesai */
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 1s ease, transform 1s ease;
    }

    .app-container.ready {
      opacity: 1;
      transform: scale(1);
    }

    /* --- ESTETIKA INTRO & LOADING SCREEN --- */
    .intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Background gradient mesh elegan */
      background: linear-gradient(135deg, #f0f9ff 0%, #cffafe 50%, #e0e7ff 100%);
      background-size: 200% 200%;
      animation: smoothBackground 8s ease infinite;
      
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      /* Transisi saat menghilang */
      transition: opacity 0.8s cubic-bezier(0.8, 0, 0.2, 1), visibility 0.8s;
    }

    @keyframes smoothBackground {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Kotak Glassmorphism Premium */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
      text-align: center;
      width: 85%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Animasi masuk berurutan (Staggered Animation) */
    .glass-panel > * {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out forwards;
    }

    .glass-panel .logo { animation-delay: 0.1s; }
    .glass-panel .title { animation-delay: 0.3s; }
    .glass-panel .subtitle { animation-delay: 0.5s; }
    .glass-panel .progress-wrapper { animation-delay: 0.7s; }
    .glass-panel .status-text { animation-delay: 0.9s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Penyesuaian Logo */
    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 24px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
    }

    /* Tipografi Elegan */
    .title {
      color: #0f172a;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.15em; /* Jarak huruf lebar untuk kesan resmi */
      margin: 0 0 8px 0;
    }

    .subtitle {
      color: #475569;
      font-size: 14px;
      font-weight: 400;
      margin: 0 0 32px 0;
    }

    /* Progress Bar Modern */
    .progress-wrapper {
      width: 100%;
      height: 4px;
      background-color: rgba(37, 99, 235, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      margin-bottom: 16px;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #2563eb, transparent);
      border-radius: 4px;
      animation: loadingSlide 1.5s infinite ease-in-out;
    }

    @keyframes loadingSlide {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    .status-text {
      color: #64748b;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Kelas untuk transisi menghilang */
    .intro-screen.hide {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-20px) scale(0.98);
    }
  </style>
</head>
<body>

  <!-- Layar Intro / Loading -->
  <div id="intro" class="intro-screen">
    <div class="glass-panel">
      <!-- Logo Sekolah -->
      <img src="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0" alt="Logo Spansa" class="logo">
      
      <!-- Judul Aplikasi -->
      <h1 class="title">MPLS SPANSA</h1>
      <p class="subtitle">UPT SMP Negeri 1 Pasuruan</p>
      
      <!-- Loading Indicator -->
      <div class="progress-wrapper">
        <div class="progress-bar"></div>
      </div>
      <p class="status-text">Memvalidasi sambungan data...</p>
    </div>
  </div>

  <!-- Iframe Aplikasi Google Apps Script Baru -->
  <iframe 
    id="gas-app"
    src="https://script.google.com/macros/s/AKfycbwrrTvQMketpPR14e_Jm1FJErs1n-tJE0DTx34YgIYwDb5M9K54Vd9Rdu-9hW8yPJ3mBQ/exec" 
    class="app-container"
    allow="geolocation; microphone; camera; midi; encrypted-media;"
    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts text/html">
  </iframe>

  <script>
    const iframe = document.getElementById('gas-app');
    const intro = document.getElementById('intro');
    
    let isIframeLoaded = false;
    let isMinimumTimeMet = false;

    // 1. Pastikan animasi berjalan minimal 2.5 detik agar terlihat elegan dan tidak berkedip cepat
    setTimeout(() => {
      isMinimumTimeMet = true;
      hideIntroKapanSiap();
    }, 2500);

    // 2. Deteksi saat aplikasi dari Apps Script sudah selesai dimuat
    iframe.onload = function() {
      isIframeLoaded = true;
      hideIntroKapanSiap();
    };

    // 3. Fungsi untuk menghilangkan intro hanya jika KEDUA syarat terpenuhi
    function hideIntroKapanSiap() {
      if (isIframeLoaded && isMinimumTimeMet) {
        // Tambahkan class untuk memulai animasi menghilang
        intro.classList.add('hide');
        iframe.classList.add('ready'); // Menampilkan iframe dengan efek fade-in halus
        
        // Hapus elemen intro dari DOM setelah transisi selesai (800ms)
        setTimeout(() => {
          intro.style.display = 'none';
        }, 800);
      }
    }
  </script>
</body>
</html>
