<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spansa Pra MPLS</title>
  
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset CSS dasar */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f3f4f6;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* --- ESTETIKA HALAMAN UTAMA --- */
    .landing-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #eff6ff, #dbeafe, #bfdbfe, #e0e7ff);
      background-size: 400% 400%;
      animation: gradientBG 6s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* Animasi Latar Belakang */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Kotak Glassmorphism di tengah */
    .content-box {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 30px rgba(29, 78, 216, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInUp 1s ease-out forwards;
      max-width: 90%;
      width: 350px;
    }

    /* Animasi masuk konten dari bawah */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo berdenyut elegan */
    .app-logo {
      max-width: 90px;
      max-height: 90px;
      object-fit: contain;
      margin-bottom: 20px;
      animation: pulseLogo 2s infinite ease-in-out;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
    }

    @keyframes pulseLogo {
      0% { transform: scale(0.95); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.9; }
    }

    /* Tipografi Teks */
    .title-text {
      color: #1e3a8a;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .subtitle-text {
      color: #64748b;
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .note-text {
      color: #3b82f6;
      font-size: 12px;
      font-weight: 300;
      margin-bottom: 25px;
      font-style: italic;
      background: rgba(59, 130, 246, 0.1);
      padding: 8px 12px;
      border-radius: 8px;
    }

    /* --- TOMBOL MASUK APLIKASI --- */
    .btn-masuk {
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
      transition: all 0.3s ease;
      letter-spacing: 1px;
      display: inline-block;
    }

    .btn-masuk:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.6);
    }

    .btn-masuk:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.4);
    }
  </style>
</head>
<body>

  <div class="landing-screen">
    <div class="content-box">
      <img src="https://lh3.googleusercontent.com/d/1tQPCSlVqJv08xNKeZRZhtRKC8T8PF-Uj?authuser=0" alt="Logo Spansa" class="app-logo">
      <div class="title-text">UPT SMP NEGERI 1 PASURUAN</div>
      <div class="subtitle-text">Aplikasi Pra MPLS Calon Murid</div>
      <div class="note-text">*Siapkan data Kartu Keluarga dan Surat Keterangan Lulus</div>
      
      <!-- Tombol Link ke AppSheet/AppScript -->
      <a href="https://script.google.com/macros/s/AKfycbwrrTvQMketpPR14e_Jm1FJErs1n-tJE0DTx34YgIYwDb5M9K54Vd9Rdu-9hW8yPJ3mBQ/exec" class="btn-masuk">MASUK APLIKASI</a>
    </div>
  </div>

</body>
</html>
